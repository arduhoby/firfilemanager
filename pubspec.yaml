name: fir_file_manager
description: "Cross-platform dual-pane file manager with SFTP/FTP/WebDAV/SMB/cloud support"
publish_to: 'none'

version: 1.0.1+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.6.1

  # Security / credential storage
  flutter_secure_storage: ^9.2.2

  # Network protocols — clients
  dartssh2: ^2.3.0
  ftpconnect: ^2.0.8
  webdav_client: ^1.2.2

  # Cloud (OAuth2 + REST)
  oauth2: ^2.0.5
  http: ^1.6.0

  # Server mode
  shelf: ^1.4.2
  shelf_router: ^1.1.4

  # File system / archives
  archive: ^3.6.1
  file_picker: ^8.1.6

  # Android SAF

  # Utilities
  intl: ^0.20.2
  path: ^1.9.0
  collection: ^1.18.0
  uuid: ^4.5.1
  mime: ^2.0.0
  filesize: ^2.0.1

  # mDNS / network discovery (Sprint 4, optional)
  bonsoir: ^5.1.3

  cupertino_icons: ^1.0.8
  path_provider: ^2.1.6
  smb_connect: ^0.0.9
  googleapis: ^16.0.0
  googleapis_auth: ^2.3.3
  url_launcher: ^6.3.2
  shared_preferences: ^2.5.5
  audioplayers: ^6.7.1
  permission_handler: ^12.0.3
  google_sign_in: ^6.2.1
  extension_google_sign_in_as_googleapis_auth: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.6.3

  # Testing
  mocktail: ^1.0.4

  # Linting
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/sounds/