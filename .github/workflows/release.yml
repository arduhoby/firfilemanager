name: Draft Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & Release
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            output-name: FirFileManager-Linux.tar.gz
            build-cmd: |
              flutter build linux --release
              tar -czvf FirFileManager-Linux.tar.gz -C build/linux/x64/release/bundle .
          - os: windows-latest
            output-name: FirFileManager-Windows-x64.zip
            build-cmd: |
              flutter build windows --release
              powershell Compress-Archive -Path build\windows\x64\release\runner\* -DestinationPath FirFileManager-Windows-x64.zip
          - os: macos-latest
            output-name: FirFileManager-macOS-Universal.dmg
            build-cmd: |
              flutter build macos --release
              hdiutil create -fs HFS+ -srcfolder build/macos/Build/Products/Release/fir_file_manager.app -volname "FirFileManager" FirFileManager-macOS-Universal.dmg

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++6

      - name: Enable Desktop Platforms
        run: |
          flutter config --enable-linux-desktop
          flutter config --enable-windows-desktop
          flutter config --enable-macos-desktop

      - name: Install dependencies
        run: flutter pub get

      - name: Build Application
        run: ${{ matrix.build-cmd }}

      - name: Create & Upload to Draft Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            FirFileManager-Linux.tar.gz
            FirFileManager-Windows-x64.zip
            FirFileManager-macOS-Universal.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
